<svg width="100%" viewBox="0 0 680 390" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>The guardian's two levels</title>
  <desc>Level 1 is code review. Level 2 is trace analysis that evolves skills and the guardian itself. L1 can escalate to L2, or the user can invoke L2 directly.</desc>

  <rect x="40" y="40" width="285" height="270" rx="8" fill="none" stroke="#c8c8c8" stroke-width="0.5"/>
  <rect x="355" y="40" width="285" height="295" rx="8" fill="none" stroke="#c8c8c8" stroke-width="0.5"/>

  <text x="56" y="66" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="10" fill="#b87520" letter-spacing="2">Level 1</text>
  <text x="56" y="92" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="16" font-weight="500" fill="#6a6a6a">Code review</text>
  <text x="56" y="112" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="12" fill="#9a9a9a">The gatekeeper.</text>
  <text x="56" y="128" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="12" fill="#9a9a9a">Validates code against skill knowledge.</text>
  <line x1="56" y1="148" x2="200" y2="148" stroke="#d8d8d8" stroke-width="0.5"/>

  <circle cx="62" cy="172" r="1.6" fill="#b87520"/>
  <text x="72" y="175" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="12" fill="#7a7a7a">Catches API misuse</text>
  <circle cx="62" cy="196" r="1.6" fill="#b87520"/>
  <text x="72" y="199" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="12" fill="#7a7a7a">Flags hallucinated methods</text>
  <circle cx="62" cy="220" r="1.6" fill="#b87520"/>
  <text x="72" y="223" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="12" fill="#7a7a7a">Surfaces lifecycle errors</text>
  <circle cx="62" cy="244" r="1.6" fill="#b87520"/>
  <text x="72" y="247" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="12" fill="#7a7a7a">Remembers known gotchas</text>

  <!-- Escalation arrow from L1 to L2 -->
  <line x1="260" y1="278" x2="360" y2="278" stroke="#b87520" stroke-width="0.8" stroke-dasharray="3 4" marker-end="url(#arrow)"/>
  <text x="310" y="272" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="8" fill="#b87520">escalate</text>

  <text x="56" y="298" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="10" fill="#a8a8a8" letter-spacing="1">ON DEMAND · VALIDATES CODE</text>

  <text x="371" y="66" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="10" fill="#b87520" letter-spacing="2">Level 2</text>
  <text x="371" y="92" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="16" font-weight="500" fill="#6a6a6a">Trace analysis</text>
  <text x="371" y="112" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="12" fill="#9a9a9a">The student.</text>
  <text x="371" y="128" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="12" fill="#9a9a9a">Reads your session JSONL via VCC.</text>
  <line x1="371" y1="148" x2="515" y2="148" stroke="#d8d8d8" stroke-width="0.5"/>

  <circle cx="377" cy="172" r="1.6" fill="#b87520"/>
  <text x="387" y="175" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="12" fill="#7a7a7a">Patches skills (editable)</text>
  <circle cx="377" cy="196" r="1.6" fill="#b87520"/>
  <text x="387" y="199" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="12" fill="#7a7a7a">Appends learned checks</text>
  <circle cx="377" cy="220" r="1.6" fill="#b87520"/>
  <text x="387" y="223" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="12" fill="#7a7a7a">Adds new VCC grep patterns</text>
  <circle cx="377" cy="244" r="1.6" fill="#b87520"/>
  <text x="387" y="247" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="12" fill="#7a7a7a">Recommends CLAUDE.md edits</text>
  <circle cx="377" cy="268" r="1.6" fill="#b87520"/>
  <text x="387" y="271" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="12" fill="#7a7a7a">Grows ecosystem (commands, scripts, hooks)</text>

  <text x="371" y="315" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="10" fill="#a8a8a8" letter-spacing="1">ON DEMAND · EVOLVES SKILLS &amp; SELF</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="370" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="12" fill="#9a8c72">L1 catches issues · L2 is what makes the skills grow.</text>
</svg>
